map $http_origin $cors_origin {
  default "";
  "~^http://localhost:4100$" $http_origin;
  "~^http://127\.0\.0\.1:4100$" $http_origin;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/apps/shell;
  index index.html;

  add_header Access-Control-Allow-Origin $cors_origin always;
  add_header Access-Control-Allow-Credentials "true" always;
  add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Authorization, Content-Type, If-None-Match, If-Modified-Since" always;
  add_header Vary "Origin" always;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /bff {
    return 308 /bff/;
  }

  location ^~ /bff/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://bff:4200/;
  }

  location ^~ /mfe/map/ {
    alias /usr/share/nginx/apps/map/;
    try_files $uri $uri/ =404;
  }

  location ^~ /mfe/fleet-ops/ {
    alias /usr/share/nginx/apps/fleet-ops/;
    try_files $uri $uri/ =404;
  }

  location ^~ /mfe/finance-stock/ {
    alias /usr/share/nginx/apps/finance-stock/;
    try_files $uri $uri/ =404;
  }

  location ^~ /mfe/network-planner/ {
    alias /usr/share/nginx/apps/network-planner/;
    try_files $uri $uri/ =404;
  }

  location ^~ /mfe/events-news/ {
    alias /usr/share/nginx/apps/events-news/;
    try_files $uri $uri/ =404;
  }

  location ^~ /mfe/hr-facilities/ {
    alias /usr/share/nginx/apps/hr-facilities/;
    try_files $uri $uri/ =404;
  }

  location / {
    if ($request_method = OPTIONS) {
      return 204;
    }

    try_files $uri $uri/ /index.html;
  }
}
