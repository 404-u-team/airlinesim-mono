      produces:
      - application/json
      responses:
        "201":
          description: Country created successfully, id returned
          schema:
            $ref: '#/definitions/operationspb.IDResponse'
        "400":
          description: 1 - request validation error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Country with such ISO already exists
        "500":
          description: Internal server error
      summary: Create country (admin only)
      tags:
      - Country
  /country/{id}:
    delete:
      description: Returns deleted country id
      parameters:
      - description: Country ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Country deleted
          schema:
            $ref: '#/definitions/operationspb.IDResponse'
        "400":
          description: 1 - invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Country not found
        "409":
          description: Country has dependencies
        "500":
          description: Internal server error
      summary: Delete country (admin only)
      tags:
      - Country
    put:
      consumes:
      - application/json
      description: Returns patched country id
      parameters:
      - description: Country ID
        in: path
        name: id
        required: true
        type: string
      - description: Country details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operationspb.ChangeCountryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Country patched successfully
          schema:
            $ref: '#/definitions/operationspb.IDResponse'
        "400":
          description: 1 - request validation error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Country not found
        "409":
          description: Country conflict
        "500":
          description: Internal server error
      summary: Change country (admin only)
      tags:
      - Country
  /region:
    post:
      consumes:
      - application/json
      description: Returns
      parameters:
      - description: Region details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operationspb.CreateRegionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Region created successfully, id returned
          schema:
            $ref: '#/definitions/dto.IDResponse'
        "400":
          description: 1 - request validation error, 2 - country with such country_id
            dont exists
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Region with such local code already exists
        "500":
          description: Internal server error
      summary: Create Region (admin only)
      tags:
      - Region
  /region-link:
    post:
      consumes:
      - application/json
      description: Returns
      parameters:
      - description: Region Link details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operationspb.CreateRegionLinkRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Region Link created successfully, id returned
          schema:
            $ref: '#/definitions/operationspb.IDResponse'
        "400":
          description: 1 - request validation error, 2 - region with such region_id
            dont exists
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Region Link with such regions already exists
        "500":
          description: Internal server error
      summary: Create Region Link (admin only)
      tags:
      - Region Link
  /region-link/{id}:
    delete:
      description: Returns deleted region link id
      parameters:
      - description: Region Link ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Region link deleted
          schema:
            $ref: '#/definitions/operationspb.IDResponse'
        "400":
          description: 1 - invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Region link not found
        "500":
          description: Internal server error
      summary: Delete region link (admin only)
      tags:
