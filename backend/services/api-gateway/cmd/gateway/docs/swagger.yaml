info:
  contact:
    email: lboris201@yandex.ru
    name: Jeno7u
    url: https://github.com/Jeno7u
  title: AirlineSim API
  version: "1.0"
paths:
  /aircraft:
    post:
      consumes:
      - application/json
      description: Purchases a new aircraft from a selected aircraft type for the
        authenticated user
      parameters:
      - description: Aircraft details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/fleetpb.CreateAircraftRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Aircraft purchased successfully, id returned
          schema:
            $ref: '#/definitions/fleetpb.CreateAircraftResponse'
        "400":
          description: 1 - request validation error, 2 - aircraft type not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
        "409":
          description: Aircraft tail number conflict
        "500":
          description: Internal server error
      summary: Purchase aircraft
      tags:
      - Aircraft
  /airport:
    post:
      consumes:
      - application/json
      description: Returns
      parameters:
      - description: Airport details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operationspb.CreateAirportRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Airport created successfully, id returned
          schema:
            $ref: '#/definitions/operationspb.IDResponse'
        "400":
          description: 1 - request validation error, 2 - country with such country_id
            dont exists, 3 - region with such region_id dont exists
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Airport with such ICAO/IATA already exists
        "500":
          description: Internal server error
      summary: Create Airport (admin only)
      tags:
      - Airport
  /airport/{id}:
    delete:
      description: Returns deleted airport id
      parameters:
      - description: Airport ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Airport deleted
          schema:
            $ref: '#/definitions/operationspb.IDResponse'
        "400":
          description: 1 - invalid id
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Airport not found
        "500":
          description: Internal server error
      summary: Delete airport (admin only)
      tags:
      - Airport
    put:
      consumes:
      - application/json
      description: Returns patched airport id
      parameters:
      - description: Airport ID
        in: path
        name: id
        required: true
        type: string
      - description: Airport details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operationspb.ChangeAirportRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Airport patched successfully
          schema:
            $ref: '#/definitions/operationspb.IDResponse'
        "400":
          description: 1 - request validation error, 2 - country not found, 3 - region
            not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Airport not found
        "409":
          description: Airport conflict
        "500":
          description: Internal server error
      summary: Change airport (admin only)
      tags:
      - Airport
  /airports:
    get:
      description: Returns all airports
      produces:
      - application/json
      responses:
        "200":
          description: Airports list
          schema:
            $ref: '#/definitions/operationspb.ListAirportsResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal server error
      summary: List airports
      tags:
      - Airport
  /auth/login:
    post:
      consumes:
      - application/json
      description: Returns access token and sets refresh token into cookie
      parameters:
      - description: User login details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User authenticated
          schema:
            $ref: '#/definitions/dto.AccessTokenResponse'
        "400":
          description: 1 - request validation error, 2 - user not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
      summary: Login user
      tags:
      - Auth
  /auth/refresh:
    post:
      description: Returns access token and sets refresh token into cookie. Doing
        that by validating refresh token
      produces:
      - application/json
      responses:
        "200":
          description: User authenticated
          schema:
            $ref: '#/definitions/dto.AccessTokenResponse'
        "401":
          description: Refresh token or user is not valid
        "500":
          description: Internal server error
      summary: Refreshes access and refresh token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Returns access token and sets refresh token into cookie
      parameters:
      - description: User registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created and authenticated
          schema:
            $ref: '#/definitions/dto.AccessTokenResponse'
        "400":
          description: 1 - request validation error, 2 - email exists, 3 - nickname
            exists
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
      summary: Register user
      tags:
      - Auth
  /countries:
    get:
      description: Returns all countries
      produces:
      - application/json
      responses:
        "200":
          description: Countries list
          schema:
            $ref: '#/definitions/operationspb.ListCountriesResponse'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal server error
      summary: List countries
      tags:
      - Country
  /country:
    post:
