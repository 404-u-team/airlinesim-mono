definitions:
  dto.AccessTokenResponse:
    properties:
      access_token:
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      login:
        maxLength: 50
        minLength: 3
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - login
    - password
    type: object
  dto.RegisterRequest:
    properties:
      email:
        maxLength: 255
        type: string
      nickname:
        maxLength: 50
        minLength: 3
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - nickname
    - password
    type: object
host: localhost:8080
info:
  contact:
    email: lboris201@yandex.ru
    name: Jeno7u
    url: https://github.com/Jeno7u
  title: AirlineSim API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Returns access token and sets refresh token into cookie
      parameters:
      - description: User login details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User authenticated
          schema:
            $ref: '#/definitions/dto.AccessTokenResponse'
        "400":
          description: 1 - request validation error, 2 - user not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
      summary: Login user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Returns access token and sets refresh token into cookie
      parameters:
      - description: User registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created and authenticated
          schema:
            $ref: '#/definitions/dto.AccessTokenResponse'
        "400":
          description: 1 - request validation error, 2 - email exists, 3 - nickname
            exists
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
      summary: Register user
      tags:
      - Auth
schemes:
- http
- https
swagger: "2.0"
