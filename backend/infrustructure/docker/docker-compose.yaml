    world-service:
        build:
            context: ../../../
            dockerfile: backend/services/world-service/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/world-service/.env
        depends_on:
            world-db:
                condition: service_healthy

    auth-service:
        build:
            context: ../../../
            dockerfile: backend/services/auth-service/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/auth-service/.env
        depends_on:
            user-db:
                condition: service_healthy

    api-gateway:
        build:
            context: ../../../
            dockerfile: backend/services/api-gateway/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/api-gateway/.env
        depends_on:
            - auth-service
            - world-service
        ports:
            - "8080:8080"

volumes:
    user_postgres_data:
    world_postgres_data:

networks:
    default:
        name: airlinesim_net
