services:
    user-db:
        image: postgres:18.3-alpine
        restart: always
        env_file:
            - ../../services/auth-service/.env
        volumes:
            - user_postgres_data:/var/lib/postgresql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1",
                ]
            interval: 5s
            timeout: 2s
            retries: 10

    tick-db:
        image: postgres:18.3-alpine
        restart: always
        env_file:
            - ../../services/tick-service/.env
        volumes:
            - tick_postgres_data:/var/lib/postgresql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1",
                ]
            interval: 5s
            timeout: 2s
            retries: 10

    airline-db:
        image: postgres:18.3-alpine
        restart: always
        env_file:
            - ../../services/airline-service/.env
        volumes:
            - airline_postgres_data:/var/lib/postgresql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1",
                ]
            interval: 5s
            timeout: 2s
            retries: 10

    fleet-db:
        image: postgres:18.3-alpine
        restart: always
        env_file:
            - ../../services/fleet-service/.env
        volumes:
            - fleet_postgres_data:/var/lib/postgresql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1",
                ]
            interval: 5s
            timeout: 2s
            retries: 10

    operations-db:
        image: postgis/postgis:18-3.6-alpine
        platform: linux/amd64
        restart: always
        env_file:
            - ../../services/operations-service/.env
        volumes:
            - operations_postgres_data:/var/lib/postgresql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1",
                ]
            interval: 5s
            timeout: 2s
            retries: 10

    kafka:
        image: confluentinc/cp-kafka:latest
        container_name: kafka
        env_file:
            - ./.env
        ports:
            - "9092:9092"
        environment:
            # KRaft mode configuration
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: "broker,controller"
            KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
            KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

            # Listeners setup
            KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
            KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
            KAFKA_LOG4J_ROOT_LOGLEVEL: "WARN"

            # Default topics / settings
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        entrypoint:
            - /bin/bash
            - -ec
            - |
                /etc/confluent/docker/run &
                kafka_pid=$$!
                until kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1; do
                    sleep 2
                done

                topics=($${KAFKA_CREATE_TOPICS//,/ })
                for topic_spec in "$${topics[@]}"; do
                    IFS=':' read -r topic partitions replication <<< "$$topic_spec"
                    kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic "$$topic" --partitions "$$partitions" --replication-factor "$$replication"
                done

                wait "$$kafka_pid"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "kafka-topics --bootstrap-server kafka:29092 --list | grep -qx 'operations_airport_created' && kafka-topics --bootstrap-server kafka:29092 --list | grep -qx 'operations_airports_deleted' && kafka-topics --bootstrap-server kafka:29092 --list | grep -qx 'tick_15_min_elapsed' && kafka-topics --bootstrap-server kafka:29092 --list | grep -qx 'tick_1_hour_elapsed'",
                ]
            interval: 10s
            timeout: 5s
            retries: 10

    tick-service:
        build:
            context: ../../../
            dockerfile: backend/services/tick-service/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/tick-service/.env
        depends_on:
            tick-db:
                condition: service_healthy
            kafka:
                condition: service_healthy

    operations-service:
        build:
            context: ../../../
            dockerfile: backend/services/operations-service/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/operations-service/.env
        depends_on:
            operations-db:
                condition: service_healthy
            kafka:
                condition: service_healthy

    airline-service:
        build:
            context: ../../../
            dockerfile: backend/services/airline-service/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/airline-service/.env
        depends_on:
            airline-db:
                condition: service_healthy

    fleet-service:
        build:
            context: ../../../
            dockerfile: backend/services/fleet-service/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/fleet-service/.env
        depends_on:
            fleet-db:
                condition: service_healthy

    auth-service:
        build:
            context: ../../../
            dockerfile: backend/services/auth-service/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/auth-service/.env
        depends_on:
            user-db:
                condition: service_healthy

    api-gateway:
        build:
            context: ../../../
            dockerfile: backend/services/api-gateway/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/api-gateway/.env
        depends_on:
            - auth-service
            - operations-service
            - fleet-service
        ports:
            - "8080:8080"

volumes:
    user_postgres_data:
    operations_postgres_data:
    tick_postgres_data:
    airline_postgres_data:
    fleet_postgres_data:

networks:
    default:
        name: airlinesim_net
