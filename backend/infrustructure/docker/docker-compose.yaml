services:
    user-db:
        image: postgres:18.3-alpine
        restart: always
        env_file:
            - ../../services/auth-service/.env
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' || exit 1",
                ]
            interval: 5s
            timeout: 2s
            retries: 10

    kafka:
        image: confluentinc/cp-kafka:latest
        container_name: kafka
        ports:
            - "9092:9092"
        environment:
            # KRaft mode configuration
            KAFKA_NODE_ID: ${KAFKA_NODE_ID}
            KAFKA_PROCESS_ROLES: "broker,controller"
            KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
            KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

            # Listeners setup
            KAFKA_LISTENERS: ${KAFKA_LISTENERS}
            KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
            KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

            # Default topics / settings
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

            # Topics created at start
            KAFKA_CREATE_TOPICS: ${KAFKA_CREATE_TOPICS}
        healthcheck:
            test:
                [
                    "CMD",
                    "kafka-topics",
                    "--bootstrap-server",
                    "kafka:29092",
                    "--list",
                ]
            interval: 10s
            timeout: 5s
            retries: 10

    auth-service:
        build:
            context: ../../../
            dockerfile: backend/services/auth-service/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/auth-service/.env
        environment:
            POSTGRES_HOST: user-db
        depends_on:
            - user-db
        ports:
            - "50051:50051"

    api-gateway:
        build:
            context: ../../../
            dockerfile: backend/services/api-gateway/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/api-gateway/.env
        depends_on:
            - auth-service
        ports:
            - "8080:8080"

volumes:
    postgres_data:
        driver: local

networks:
    default:
        name: airlinesim_net
