services:
    user-db:
        image: postgres:18.3-alpine
        restart: always
        env_file:
            - ../../services/auth-service/.env
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' || exit 1",
                ]
            interval: 5s
            timeout: 2s
            retries: 10

    auth-service:
        build:
            context: ../../../
            dockerfile: backend/services/auth-service/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/auth-service/.env
        environment:
            POSTGRES_HOST: user-db
        depends_on:
            - user-db
        ports:
            - "50051:50051"

    api-gateway:
        build:
            context: ../../../
            dockerfile: backend/services/api-gateway/Dockerfile
        restart: on-failure
        env_file:
            - ../../services/api-gateway/.env
        depends_on:
            - auth-service
        ports:
            - "8080:8080"

volumes:
    postgres_data:
        driver: local

networks:
    default:
        name: airlinesim_net
