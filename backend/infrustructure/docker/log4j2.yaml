Configuration:
    name: "Log4j2"

    Appenders:
        Console:
            name: STDOUT
            target: SYSTEM_OUT
            PatternLayout:
                Pattern: "[%d] %p %m (%c)%n"

    Loggers:
        Root:
            level: "ERROR"
            AppenderRef:
                - ref: STDOUT

        Logger:
            - name: "kafka"
              level: "ERROR"
              AppenderRef:
                  - ref: STDOUT
            - name: "kafka.authorizer.logger"
              level: "ERROR"
              AppenderRef:
                  - ref: STDOUT
            - name: "kafka.controller"
              level: "ERROR"
              AppenderRef:
                  - ref: STDOUT
            - name: "kafka.log.LogCleaner"
              level: "ERROR"
              AppenderRef:
                  - ref: STDOUT
            - name: "kafka.network.RequestChannel$"
              level: "ERROR"
              AppenderRef:
                  - ref: STDOUT
            - name: "kafka.producer.async.DefaultEventHandler"
              level: "ERROR"
              AppenderRef:
                  - ref: STDOUT
            - name: "kafka.request.logger"
              level: "ERROR"
              AppenderRef:
                  - ref: STDOUT
            - name: "state.change.logger"
              level: "WARN"
              AppenderRef:
                  - ref: STDOUT
