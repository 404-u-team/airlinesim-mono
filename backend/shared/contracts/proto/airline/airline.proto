syntax = "proto3";

package auth.v1;

option go_package = "github.com/404-u-team/airlinesim-mono/backend/shared/contracts/proto/airline/v1;airlinepb";

// Run inside this folder to autogenerate golang grpc
/*
protoc --go_out=./v1 --go_opt=paths=source_relative \
    --go-grpc_out=./v1 --go-grpc_opt=paths=source_relative \
  airline.proto
*/

// airline service
service AirlineService {
  // create country, returns id of newly created country
  rpc CreateAirline(CreateAirlineRequest) returns (CreateAirlineResponse);

  // adjust airline balance by signed amount
  rpc AdjustBalance(AdjustBalanceRequest) returns (AdjustBalanceResponse);

  // get airline by its id
  rpc GetAirlineByID(GetAirlineByIDRequest) returns (AirlineResponse);

  // get authenticated user's airline
  rpc GetAirlineByOwnerID(GetAirlineByOwnerIDRequest) returns (AirlineResponse);
  // update airline fields (name, iata_code, icao_code)
  rpc UpdateAirline(UpdateAirlineRequest) returns (AirlineResponse);
}

// request to create a new airline.
message CreateAirlineRequest {
  string owner_id = 1;
  string starting_airport_id = 2;
  string name = 3;
  string iata_code = 4;
  string icao_code = 5;
}

// response with id and balance of created entity
message CreateAirlineResponse {
    string id = 1;
    double balance = 2;
}

// request to adjust airline balance by signed amount.
message AdjustBalanceRequest {
  string owner_id = 1;
  double amount = 2;
}

// response with airline id and updated balance.
message AdjustBalanceResponse {
  string airline_id = 1;
  double balance = 2;
}

message GetAirlineByIDRequest {
  string id = 1;
}

message GetAirlineByOwnerIDRequest {
  string owner_id = 1;
}

message AirlineResponse {
  string id = 1;
  string owner_id = 2;
  string starting_airport_id = 3;
  string name = 4;
  string iata_code = 5;
  string icao_code = 6;
  double balance = 7;
  double equity_cached = 8;
  string equity_cached_at = 9;
  int32 credit_rating = 10;
  int32 safety_rating = 11;
  int32 reputation = 12;
  bool is_public = 13;
  bool is_bankrupt = 14;
  string created_at = 15;
}

message UpdateAirlineRequest {
  string id = 1;
  string name = 2;
  string iata_code = 3;
  string icao_code = 4;
}

