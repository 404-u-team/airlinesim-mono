syntax = "proto3";

package fleet.v1;

option go_package = "github.com/404-u-team/airlinesim-mono/backend/shared/contracts/proto/fleet/v1;fleetpb";
import "google/protobuf/empty.proto";

// Run inside this folder to autogenerate golang grpc
/*
protoc --go_out=./v1 --go_opt=paths=source_relative \
    --go-grpc_out=./v1 --go-grpc_opt=paths=source_relative \
    fleet.proto
*/

// fleet service
service FleetService {
  // create aircraft from selected aircraft type
  rpc CreateAircraft(CreateAircraftRequest) returns (CreateAircraftResponse);
  // create new aircraft type (admin only)
  rpc CreateAircraftType(CreateAircraftTypeRequest) returns (AircraftType);
  // list available aircraft types
  rpc ListAircraftTypes(google.protobuf.Empty) returns (ListAircraftTypesResponse);
  // get aircraft type by id
  rpc GetAircraftType(GetAircraftTypeRequest) returns (AircraftType);
  // list aircrafts owned by airline
  rpc ListAircrafts(ListAircraftsRequest) returns (ListAircraftsResponse);
  // get aircraft by id
  rpc GetAircraft(GetAircraftRequest) returns (Aircraft);
  // update aircraft (patch)
  rpc UpdateAircraft(UpdateAircraftRequest) returns (Aircraft);
}

message CreateAircraftRequest {
  string aircraft_type_id = 1;
  string base_airport_id = 2;
  string tail_number = 3;
  string current_owner_id = 4;
}

message CreateAircraftResponse {
  string id = 1;
}

message CreateAircraftTypeRequest {
  string manufacturer_id = 1;
  string model_name = 2;
  string icao_code = 3;
  string iata_code = 4;
  string image_upload_id = 5;
  double max_range_km = 6;
  double cruising_speed_kph = 7;
  double max_planned_seat_capacity = 8;
  double min_runway_length_m = 9;
  double production_points_price = 10;
  double base_turnaround_points = 11;
  double base_maintenance_points = 12;
  double maint_cost_per_takeoff = 13;
  double maint_cost_per_landing = 14;
  double maint_cost_per_flight_hour = 15;
  double d_check_interval_fh = 16;
  double d_check_interval_years = 17;
  double d_check_overdue_multiplier = 18;
  double fuel_consumption_per_hour = 19;
  double mtow_kg = 20;
  double price_per_unit = 21;
  string characteristics = 22;
}

message AircraftType {
  string id = 1;
  string manufacturer_id = 2;
  string model_name = 3;
  string icao_code = 4;
  string iata_code = 5;
  string image_upload_id = 6;
  double max_range_km = 7;
  double cruising_speed_kph = 8;
  double max_planned_seat_capacity = 9;
  double min_runway_length_m = 10;
  double production_points_price = 11;
  double base_turnaround_points = 12;
  double base_maintenance_points = 13;
  double maint_cost_per_takeoff = 14;
  double maint_cost_per_landing = 15;
  double maint_cost_per_flight_hour = 16;
  double d_check_interval_fh = 17;
  double d_check_interval_years = 18;
  double d_check_overdue_multiplier = 19;
  double fuel_consumption_per_hour = 20;
  double mtow_kg = 21;
  double price_per_unit = 22;
  string characteristics = 23;
}

message ListAircraftTypesResponse {
  repeated AircraftType items = 1;
}

message GetAircraftTypeRequest {
  string id = 1;
}

message Aircraft {
  string id = 1;
  string type_id = 2;
  string current_owner_id = 3;
  string base_airport_id = 4;
  string tail_number = 5;
  bool in_service = 6;
  string status = 7;
  double current_maintenance_points = 8;
  double max_maintenance_points_cached = 9;
  double total_flight_hours = 10;
  double fh_since_last_d_check = 11;
  double total_cycles = 12;
  string manufactured_at = 13;
}

message ListAircraftsRequest {
  string owner_id = 1;
}

message ListAircraftsResponse {
  repeated Aircraft items = 1;
}

message GetAircraftRequest {
  string id = 1;
}

message UpdateAircraftRequest {
  string id = 1;
  string tail_number = 2;
}
